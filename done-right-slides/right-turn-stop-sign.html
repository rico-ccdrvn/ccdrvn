<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Right Turn at a Stop Sign — ClearConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" type="text/css" media="all" href="static/css/webslides.css">
  <style>
    #webslides section.dr{ background:#0D0F12; padding:0; }
    .dr .wrap{ max-width:100%; padding:0; height:100%; }
    .dr svg{ display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<main role="main">
  <article id="webslides">

  <!-- ============ SLIDE 1 — TITLE ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Right turn at a stop sign — title"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <!-- stop sign emblem -->
    <g transform="translate(600,250)">
      <polygon points="-66,-27 -27,-66 27,-66 66,-27 66,27 27,66 -27,66 -66,27"
               fill="#F05C5C" stroke="#0D0F12" stroke-width="6"/>
      <text x="0" y="11" text-anchor="middle" fill="#0D0F12" font-size="30" font-weight="700">STOP</text>
    </g>
    <text x="600" y="400" text-anchor="middle" fill="#E6EAF0" font-size="52" font-weight="700">Right Turn at a Stop Sign</text>
    <text x="600" y="450" text-anchor="middle" fill="#8A8F9A" font-size="22">Done Right</text>
    <rect x="470" y="500" width="260" height="44" rx="22" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="600" y="528" text-anchor="middle" fill="#3DD68C" font-size="17" font-weight="700">Tap or swipe to begin &#8594;</text>
    <text x="600" y="660" text-anchor="middle" fill="#8A8F9A" font-size="15">Per the Official Ontario MTO Driver's Handbook</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 2 — APPROACH & SIGNAL ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Approach the stop in the right lane and signal early"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">1</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Approach &amp; signal early</text>

    <!-- main road horizontal (the road you turn onto) -->
    <rect x="60" y="150" width="760" height="200" fill="#1A1D24"/>
    <line x1="60" y1="150" x2="820" y2="150" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="60" y1="350" x2="820" y2="350" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="60" y1="250" x2="820" y2="250" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <!-- your side road, vertical from bottom -->
    <rect x="600" y="350" width="200" height="320" fill="#1A1D24"/>
    <line x1="600" y1="350" x2="600" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="800" y1="350" x2="800" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="700" y1="378" x2="700" y2="670" stroke="#E6EAF0" stroke-width="2" stroke-dasharray="22 20" opacity=".5"/>

    <!-- stop line + stop sign -->
    <rect x="704" y="356" width="92" height="10" fill="#E6EAF0"/>
    <g transform="translate(836,372)">
      <polygon points="-22,-9 -9,-22 9,-22 22,-9 22,9 9,22 -9,22 -22,9" fill="#F05C5C"/>
      <text x="0" y="5" text-anchor="middle" fill="#0D0F12" font-size="11" font-weight="700">STOP</text>
    </g>

    <!-- ego car (blue), in the right half of side road, facing up, right blinker on -->
    <g>
      <rect x="712" y="430" width="60" height="120" rx="13" fill="#5BA8F5"/>
      <rect x="720" y="442" width="44" height="22" rx="5" fill="#0D0F12" opacity=".5"/>
      <rect x="720" y="516" width="44" height="22" rx="5" fill="#0D0F12" opacity=".5"/>
      <!-- right turn signal blink (front-right corner) -->
      <circle cx="766" cy="436" r="7" fill="#F5A623"/>
      <text x="742" y="600" text-anchor="middle" fill="#5BA8F5" font-size="14" font-weight="700">YOU</text>
    </g>
    <!-- smooth-brake arrow up to the line -->
    <path d="M742,430 L742,372" fill="none" stroke="#5BA8F5" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#a2)"/>
    <defs><marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#5BA8F5"/></marker></defs>

    <!-- step cards -->
    <g>
      <rect x="60" y="430" width="500" height="62" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="92" cy="461" r="13" fill="#F5A623"/><text x="92" y="466" text-anchor="middle" fill="#0D0F12" font-size="13" font-weight="700">A</text>
      <text x="118" y="455" fill="#E6EAF0" font-size="17" font-weight="700">Signal right ~30 m before the stop</text>
      <text x="118" y="479" fill="#8A8F9A" font-size="14">Let others read your intention early.</text>
      <rect x="60" y="504" width="500" height="62" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="92" cy="535" r="13" fill="#5BA8F5"/><text x="92" y="540" text-anchor="middle" fill="#0D0F12" font-size="13" font-weight="700">B</text>
      <text x="118" y="529" fill="#E6EAF0" font-size="17" font-weight="700">Stay in the right lane, brake smoothly</text>
      <text x="118" y="553" fill="#8A8F9A" font-size="14">Progressive braking — no late, hard stop.</text>
    </g>
    <text x="60" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — turning right; signalling.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 3 — FULL STOP ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Make a complete stop behind the line"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">2</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Make a complete stop</text>

    <!-- side road slice with stop line -->
    <rect x="120" y="120" width="360" height="540" fill="#1A1D24"/>
    <line x1="120" y1="120" x2="120" y2="660" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="480" y1="120" x2="480" y2="660" stroke="#E6EAF0" stroke-width="3"/>
    <rect x="120" y="190" width="360" height="12" fill="#E6EAF0"/>
    <text x="300" y="170" text-anchor="middle" fill="#8A8F9A" font-size="14">STOP LINE</text>

    <!-- CORRECT: stopped behind the line (green) -->
    <g>
      <rect x="270" y="250" width="60" height="120" rx="13" fill="#5BA8F5"/>
      <rect x="278" y="262" width="44" height="22" rx="5" fill="#0D0F12" opacity=".5"/>
      <rect x="278" y="336" width="44" height="22" rx="5" fill="#0D0F12" opacity=".5"/>
    </g>
    <circle cx="300" cy="232" r="15" fill="#3DD68C"/><path d="M293,232 l5,6 l9,-12" fill="none" stroke="#0D0F12" stroke-width="3"/>
    <text x="300" y="410" text-anchor="middle" fill="#3DD68C" font-size="15" font-weight="700">Wheels fully stopped, behind the line</text>

    <!-- panel: what counts -->
    <rect x="560" y="190" width="580" height="150" rx="14" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="588" y="232" fill="#E6EAF0" font-size="21" font-weight="700">A complete stop means zero motion</text>
    <text x="588" y="266" fill="#8A8F9A" font-size="16">The wheels stop turning — even a slow creep through</text>
    <text x="588" y="290" fill="#8A8F9A" font-size="16">the line is a rolling stop and is scored as an error.</text>
    <text x="588" y="320" fill="#8A8F9A" font-size="16">Stop <tspan fill="#E6EAF0" font-weight="700">before</tspan> the line so you can still see it.</text>

    <!-- WRONG: rolling stop ghost -->
    <rect x="560" y="380" width="580" height="150" rx="14" fill="#1A1D24" stroke="#F05C5C"/>
    <g opacity=".9">
      <rect x="592" y="410" width="46" height="90" rx="10" fill="#F05C5C" opacity=".55"/>
    </g>
    <path d="M615,500 L615,408" fill="none" stroke="#F05C5C" stroke-width="3" marker-end="url(#a3)"/>
    <defs><marker id="a3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="672" y="430" fill="#F05C5C" font-size="18" font-weight="700">Rolling stop</text>
    <text x="672" y="458" fill="#8A8F9A" font-size="15">Slowing but never stopping — the most</text>
    <text x="672" y="480" fill="#8A8F9A" font-size="15">common stop-sign error on a road test.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — stopping at a stop sign.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 4 — CREEP & PEEK ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="When the view is blocked, creep forward and stop again"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">3</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">View blocked? Creep &amp; peek</text>

    <!-- main road across top -->
    <rect x="60" y="150" width="800" height="170" fill="#1A1D24"/>
    <line x1="60" y1="150" x2="860" y2="150" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="60" y1="320" x2="600" y2="320" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="60" y1="235" x2="860" y2="235" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <!-- side road -->
    <rect x="600" y="320" width="200" height="350" fill="#1A1D24"/>
    <line x1="600" y1="320" x2="600" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="800" y1="320" x2="800" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <rect x="604" y="326" width="92" height="10" fill="#E6EAF0"/>

    <!-- sight obstruction: parked vehicles / hedge along the main road to the left -->
    <rect x="360" y="96" width="220" height="48" rx="8" fill="#2A2D35"/>
    <text x="470" y="126" text-anchor="middle" fill="#8A8F9A" font-size="13">PARKED CARS / HEDGE — blocks your view</text>

    <!-- cross traffic hidden behind obstruction (red) -->
    <rect x="300" y="172" width="80" height="38" rx="8" fill="#F05C5C"/>
    <path d="M380,191 L520,191" fill="none" stroke="#F05C5C" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#a4)"/>
    <defs><marker id="a4" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>

    <!-- position 1: at the line, can't see -->
    <g>
      <rect x="612" y="430" width="58" height="110" rx="12" fill="#5BA8F5" opacity=".55"/>
    </g>
    <circle cx="641" cy="412" r="13" fill="#F5A623"/><text x="641" y="417" text-anchor="middle" fill="#0D0F12" font-size="13" font-weight="700">1</text>
    <text x="560" y="575" fill="#8A8F9A" font-size="14">Stop 1: at the line</text>

    <!-- position 2: edged forward to sightline, stop again -->
    <g>
      <rect x="612" y="346" width="58" height="78" rx="12" fill="#5BA8F5"/>
    </g>
    <circle cx="641" cy="332" r="13" fill="#3DD68C"/><text x="641" y="337" text-anchor="middle" fill="#0D0F12" font-size="13" font-weight="700">2</text>
    <!-- now sightline clears -->
    <path d="M645,360 L420,210" fill="none" stroke="#3DD68C" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="430" y="360" fill="#3DD68C" font-size="14" font-weight="700">now you can see</text>

    <rect x="60" y="430" width="470" height="150" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="86" y="470" fill="#E6EAF0" font-size="20" font-weight="700">Two-stage stop</text>
    <text x="86" y="502" fill="#8A8F9A" font-size="15">1 — Full stop at the line.</text>
    <text x="86" y="528" fill="#8A8F9A" font-size="15">2 — Edge forward slowly to where you can</text>
    <text x="86" y="550" fill="#8A8F9A" font-size="15">     see, then stop again before going.</text>
    <text x="60" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — obstructed view at intersections.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 5 — SCAN & YIELD ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Scan left right left and yield to pedestrians and cross traffic"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">4</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Scan and yield before you go</text>

    <!-- intersection -->
    <rect x="120" y="150" width="720" height="200" fill="#1A1D24"/>
    <line x1="120" y1="150" x2="840" y2="150" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="120" y1="250" x2="840" y2="250" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <rect x="560" y="350" width="200" height="320" fill="#1A1D24"/>
    <line x1="560" y1="350" x2="560" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="760" y1="350" x2="760" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <rect x="564" y="356" width="92" height="10" fill="#E6EAF0"/>

    <!-- crosswalk -->
    <g fill="#8A8F9A" opacity=".7">
      <rect x="500" y="356" width="14" height="60"/><rect x="524" y="356" width="14" height="60"/>
      <rect x="548" y="356" width="14" height="60"/>
    </g>
    <!-- pedestrian (amber) -->
    <circle cx="521" cy="386" r="13" fill="#F5A623"/>
    <text x="455" y="450" text-anchor="middle" fill="#F5A623" font-size="14" font-weight="700">yield to peds</text>

    <!-- ego -->
    <rect x="672" y="430" width="60" height="120" rx="13" fill="#5BA8F5"/>
    <text x="702" y="600" text-anchor="middle" fill="#5BA8F5" font-size="14" font-weight="700">YOU</text>

    <!-- L - R - L scan arcs from the driver -->
    <path d="M690,440 Q360,300 230,200" fill="none" stroke="#5BA8F5" stroke-width="2.6" marker-end="url(#a5)"/>
    <path d="M712,440 Q1010,300 1120,210" fill="none" stroke="#5BA8F5" stroke-width="2.6" marker-end="url(#a5)" opacity=".85"/>
    <text x="250" y="180" fill="#5BA8F5" font-size="15" font-weight="700">LEFT</text>
    <text x="1090" y="190" fill="#5BA8F5" font-size="15" font-weight="700">RIGHT</text>
    <defs><marker id="a5" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#5BA8F5"/></marker></defs>

    <!-- cross traffic from the left (priority) -->
    <rect x="200" y="270" width="80" height="40" rx="8" fill="#F05C5C"/>
    <path d="M280,290 L470,290" fill="none" stroke="#F05C5C" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#a5b)"/>
    <defs><marker id="a5b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>

    <rect x="880" y="430" width="270" height="150" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="906" y="470" fill="#E6EAF0" font-size="19" font-weight="700">Left &#8594; Right &#8594; Left</text>
    <text x="906" y="500" fill="#8A8F9A" font-size="15">Cross traffic on the road has the</text>
    <text x="906" y="522" fill="#8A8F9A" font-size="15">right of way — wait for a safe gap.</text>
    <text x="906" y="552" fill="#8A8F9A" font-size="15">Pedestrians cross first, always.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — yielding right of way; pedestrians.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 6 — THE TURN ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Turn tight into the nearest lane, not wide"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">5</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Turn tight into the nearest lane</text>

    <!-- main road -->
    <rect x="120" y="150" width="960" height="200" fill="#1A1D24"/>
    <line x1="120" y1="150" x2="1080" y2="150" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="120" y1="350" x2="600" y2="350" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="120" y1="250" x2="1080" y2="250" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <text x="300" y="205" text-anchor="middle" fill="#8A8F9A" font-size="13">your direction &#8594;</text>
    <!-- side road -->
    <rect x="600" y="350" width="200" height="320" fill="#1A1D24"/>
    <line x1="600" y1="350" x2="600" y2="670" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="800" y1="350" x2="800" y2="670" stroke="#E6EAF0" stroke-width="3"/>

    <!-- ego -->
    <rect x="672" y="430" width="58" height="110" rx="12" fill="#5BA8F5"/>
    <text x="701" y="590" text-anchor="middle" fill="#5BA8F5" font-size="13" font-weight="700">YOU</text>

    <!-- CORRECT tight path into nearest (lower) lane, green -->
    <path d="M701,430 Q701,300 880,300" fill="none" stroke="#3DD68C" stroke-width="5" marker-end="url(#a6g)"/>
    <defs><marker id="a6g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#3DD68C"/></marker></defs>
    <text x="930" y="295" fill="#3DD68C" font-size="16" font-weight="700">Nearest lane &#10003;</text>

    <!-- WRONG wide path swinging into far lane, red dashed -->
    <path d="M715,430 Q740,230 900,200" fill="none" stroke="#F05C5C" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#a6r)"/>
    <defs><marker id="a6r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="905" y="195" fill="#F05C5C" font-size="16" font-weight="700">Wide turn &#10007;</text>

    <rect x="120" y="430" width="470" height="150" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="146" y="470" fill="#E6EAF0" font-size="20" font-weight="700">Keep it tight</text>
    <text x="146" y="502" fill="#8A8F9A" font-size="15">Finish in the lane closest to the curb —</text>
    <text x="146" y="524" fill="#8A8F9A" font-size="15">the nearest lane to your right.</text>
    <text x="146" y="554" fill="#8A8F9A" font-size="15">Swinging wide into the far lane is an error.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — completing a right turn into the nearest lane.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 7 — RECAP ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Recap of common right turn stop sign errors"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <text x="600" y="80" text-anchor="middle" fill="#E6EAF0" font-size="32" font-weight="700">Right turn at a stop sign — recap</text>

    <g>
      <rect x="150" y="130" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="165" r="14" fill="#F5A623"/><text x="190" y="170" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">1</text>
      <text x="222" y="171" fill="#E6EAF0" font-size="18">Signal right ~30 m early, stay in the right lane.</text>

      <rect x="150" y="212" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="247" r="14" fill="#5BA8F5"/><text x="190" y="252" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">2</text>
