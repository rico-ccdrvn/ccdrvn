<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Left Turn on a Green Light — ClearConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" type="text/css" media="all" href="static/css/webslides.css">
  <style>
    #webslides section.dr{ background:#0D0F12; padding:0; }
    .dr .wrap{ max-width:100%; padding:0; height:100%; }
    .dr svg{ display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<main role="main">
  <article id="webslides">

  <!-- ============ SLIDE 1 — TITLE ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Left turn on a green light — title"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <!-- traffic light emblem, green lit -->
    <g transform="translate(600,235)">
      <rect x="-34" y="-66" width="68" height="150" rx="16" fill="#1A1D24" stroke="#2A2D35" stroke-width="3"/>
      <circle cx="0" cy="-38" r="16" fill="#2A2D35"/>
      <circle cx="0" cy="2" r="16" fill="#2A2D35"/>
      <circle cx="0" cy="42" r="16" fill="#3DD68C"/>
    </g>
    <text x="600" y="400" text-anchor="middle" fill="#E6EAF0" font-size="50" font-weight="700">Left Turn on a Green Light</text>
    <text x="600" y="450" text-anchor="middle" fill="#8A8F9A" font-size="22">Done Right</text>
    <rect x="470" y="500" width="260" height="44" rx="22" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="600" y="528" text-anchor="middle" fill="#3DD68C" font-size="17" font-weight="700">Tap or swipe to begin &#8594;</text>
    <text x="600" y="660" text-anchor="middle" fill="#8A8F9A" font-size="15">Per the Official Ontario MTO Driver's Handbook</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 2 — APPROACH & SIGNAL ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Signal left and approach in the left lane"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">1</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Signal left, take the left lane</text>

    <!-- vertical road, two lanes each way; ego approaches from bottom (northbound, right half) -->
    <rect x="500" y="120" width="280" height="540" fill="#1A1D24"/>
    <line x1="500" y1="120" x2="500" y2="660" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="780" y1="120" x2="780" y2="660" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="640" y1="120" x2="640" y2="660" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <line x1="710" y1="120" x2="710" y2="660" stroke="#E6EAF0" stroke-width="2" stroke-dasharray="22 20" opacity=".5"/>
    <line x1="570" y1="120" x2="570" y2="660" stroke="#E6EAF0" stroke-width="2" stroke-dasharray="22 20" opacity=".5"/>

    <!-- ego in the LEFT lane of your direction (just right of centre line), left blinker -->
    <g>
      <rect x="650" y="470" width="56" height="116" rx="13" fill="#5BA8F5"/>
      <rect x="657" y="482" width="42" height="22" rx="5" fill="#0D0F12" opacity=".5"/>
      <circle cx="650" cy="476" r="7" fill="#F5A623"/>
      <text x="678" y="630" text-anchor="middle" fill="#5BA8F5" font-size="14" font-weight="700">YOU</text>
    </g>
    <text x="676" y="160" text-anchor="middle" fill="#8A8F9A" font-size="13">your direction &#8593;</text>

    <rect x="80" y="300" width="380" height="150" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="106" y="340" fill="#E6EAF0" font-size="20" font-weight="700">Set up early</text>
    <text x="106" y="372" fill="#8A8F9A" font-size="15">Signal left ~30 m before the intersection.</text>
    <text x="106" y="398" fill="#8A8F9A" font-size="15">Move into the left lane for your direction</text>
    <text x="106" y="420" fill="#8A8F9A" font-size="15">so you're ready to turn, not crossing late.</text>
    <text x="80" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — turning left; lane selection.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 3 — ENTER & POSITION ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Enter on green and position just past centre with wheels straight"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">2</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Enter on green, wheels straight</text>

    <!-- four-way intersection -->
    <rect x="470" y="120" width="260" height="540" fill="#1A1D24"/>
    <rect x="120" y="270" width="960" height="240" fill="#1A1D24"/>
    <!-- centre lines -->
    <line x1="600" y1="120" x2="600" y2="270" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>
    <line x1="600" y1="510" x2="600" y2="660" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>
    <line x1="120" y1="390" x2="470" y2="390" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>
    <line x1="730" y1="390" x2="1080" y2="390" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>

    <!-- ego advanced just past centre, facing up, wheels straight -->
    <g>
      <rect x="612" y="360" width="54" height="112" rx="13" fill="#5BA8F5"/>
      <rect x="619" y="372" width="40" height="20" rx="5" fill="#0D0F12" opacity=".5"/>
      <!-- straight wheels indicator -->
      <rect x="606" y="378" width="8" height="18" rx="2" fill="#3DD68C"/>
      <rect x="664" y="378" width="8" height="18" rx="2" fill="#3DD68C"/>
      <text x="639" y="510" text-anchor="middle" fill="#5BA8F5" font-size="13" font-weight="700">YOU</text>
    </g>
    <circle cx="639" cy="345" r="14" fill="#3DD68C"/><path d="M632,345 l5,6 l9,-12" fill="none" stroke="#0D0F12" stroke-width="3"/>

    <rect x="800" y="540" width="340" height="120" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="826" y="578" fill="#E6EAF0" font-size="19" font-weight="700">Wait inside the intersection</text>
    <text x="826" y="608" fill="#8A8F9A" font-size="15">On a solid green you may advance just</text>
    <text x="826" y="630" fill="#8A8F9A" font-size="15">past centre to wait — wheels pointed</text>
    <text x="826" y="652" fill="#8A8F9A" font-size="15">straight ahead, not yet turned.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — left turns at traffic lights.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 4 — YIELD TO ONCOMING ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Yield to oncoming traffic and pedestrians"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">3</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Yield to oncoming first</text>

    <rect x="470" y="120" width="260" height="540" fill="#1A1D24"/>
    <rect x="120" y="270" width="960" height="240" fill="#1A1D24"/>
    <line x1="600" y1="120" x2="600" y2="270" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>
    <line x1="600" y1="510" x2="600" y2="660" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>

    <!-- ego waiting just past centre -->
    <rect x="612" y="360" width="54" height="112" rx="13" fill="#5BA8F5"/>
    <text x="639" y="508" text-anchor="middle" fill="#5BA8F5" font-size="13" font-weight="700">YOU</text>

    <!-- oncoming vehicle (red) coming DOWN the left half toward you, has priority -->
    <rect x="534" y="150" width="52" height="104" rx="12" fill="#F05C5C"/>
    <path d="M560,256 L560,340" fill="none" stroke="#F05C5C" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#lo)"/>
    <defs><marker id="lo" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="430" y="210" text-anchor="middle" fill="#F05C5C" font-size="15" font-weight="700">oncoming</text>
    <text x="430" y="232" text-anchor="middle" fill="#8A8F9A" font-size="13">has the right of way</text>

    <!-- pedestrian crossing your exit (amber) -->
    <g fill="#8A8F9A" opacity=".6"><rect x="320" y="430" width="50" height="12"/><rect x="320" y="455" width="50" height="12"/><rect x="320" y="480" width="50" height="12"/></g>
    <circle cx="345" cy="408" r="12" fill="#F5A623"/>
    <text x="345" y="540" text-anchor="middle" fill="#F5A623" font-size="13" font-weight="700">peds too</text>

    <rect x="800" y="150" width="340" height="150" rx="14" fill="#1A1D24" stroke="#F05C5C"/>
    <text x="826" y="190" fill="#E6EAF0" font-size="19" font-weight="700">Wait for a safe gap</text>
    <text x="826" y="222" fill="#8A8F9A" font-size="15">Oncoming traffic going straight or</text>
    <text x="826" y="244" fill="#8A8F9A" font-size="15">turning right goes before you.</text>
    <text x="826" y="274" fill="#8A8F9A" font-size="15">Failing to yield here is a serious error.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — yielding on a left turn.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 5 — WHEELS STRAIGHT, WHY ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Why wheels stay straight while you wait"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">4</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Why wheels stay straight</text>

    <!-- LEFT: correct, wheels straight -->
    <rect x="120" y="140" width="430" height="470" rx="16" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="335" y="180" text-anchor="middle" fill="#3DD68C" font-size="18" font-weight="700">Wheels straight</text>
    <rect x="305" y="300" width="60" height="120" rx="14" fill="#5BA8F5"/>
    <rect x="299" y="318" width="8" height="20" rx="2" fill="#3DD68C"/><rect x="363" y="318" width="8" height="20" rx="2" fill="#3DD68C"/>
    <!-- rear hit -->
    <rect x="316" y="448" width="38" height="40" rx="6" fill="#F05C5C" opacity=".5"/>
    <path d="M335,448 L335,425" fill="none" stroke="#F05C5C" stroke-width="3" marker-end="url(#ws1)"/>
    <defs><marker id="ws1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <path d="M335,300 L335,210" fill="none" stroke="#3DD68C" stroke-width="3" stroke-dasharray="3 7" marker-end="url(#ws2)"/>
    <defs><marker id="ws2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#3DD68C"/></marker></defs>
    <text x="335" y="560" text-anchor="middle" fill="#8A8F9A" font-size="14">If hit from behind, you're pushed</text>
    <text x="335" y="582" text-anchor="middle" fill="#8A8F9A" font-size="14">straight ahead — not into oncoming.</text>

    <!-- RIGHT: wrong, wheels pre-turned -->
    <rect x="650" y="140" width="430" height="470" rx="16" fill="#1A1D24" stroke="#F05C5C"/>
    <text x="865" y="180" text-anchor="middle" fill="#F05C5C" font-size="18" font-weight="700">Wheels pre-turned &#10007;</text>
    <g transform="rotate(-32 865 360)">
      <rect x="835" y="300" width="60" height="120" rx="14" fill="#5BA8F5"/>
      <rect x="829" y="318" width="8" height="20" rx="2" fill="#F05C5C"/><rect x="893" y="318" width="8" height="20" rx="2" fill="#F05C5C"/>
    </g>
    <rect x="846" y="455" width="38" height="40" rx="6" fill="#F05C5C" opacity=".5"/>
    <path d="M865,455 L865,432" fill="none" stroke="#F05C5C" stroke-width="3" marker-end="url(#ws3)"/>
    <defs><marker id="ws3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <path d="M845,320 L720,235" fill="none" stroke="#F05C5C" stroke-width="3" stroke-dasharray="3 7" marker-end="url(#ws4)"/>
    <defs><marker id="ws4" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="865" y="560" text-anchor="middle" fill="#8A8F9A" font-size="14">Pre-turned wheels send you into</text>
    <text x="865" y="582" text-anchor="middle" fill="#8A8F9A" font-size="14">the path of oncoming traffic.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — waiting to turn left safely.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 6 — COMPLETE THE TURN ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Complete the turn into the nearest left lane"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">5</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Complete the turn — correct lane</text>

    <rect x="470" y="120" width="260" height="540" fill="#1A1D24"/>
    <rect x="120" y="270" width="960" height="240" fill="#1A1D24"/>
    <line x1="120" y1="390" x2="470" y2="390" stroke="#F5A623" stroke-width="3" stroke-dasharray="24 20"/>
    <line x1="295" y1="270" x2="295" y2="510" stroke="#E6EAF0" stroke-width="2" stroke-dasharray="22 20" opacity=".5"/>

    <!-- ego mid-turn -->
    <rect x="612" y="360" width="54" height="112" rx="13" fill="#5BA8F5"/>
    <text x="639" y="500" text-anchor="middle" fill="#5BA8F5" font-size="13" font-weight="700">YOU</text>

    <!-- CORRECT: into nearest left lane (the lane just below centre on the left road), green -->
    <path d="M639,360 Q639,450 300,450" fill="none" stroke="#3DD68C" stroke-width="5" marker-end="url(#ltg)"/>
    <defs><marker id="ltg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#3DD68C"/></marker></defs>
    <text x="200" y="478" fill="#3DD68C" font-size="15" font-weight="700">nearest lane &#10003;</text>

    <!-- WRONG: into far lane, red dashed -->
    <path d="M650,360 Q650,330 300,330" fill="none" stroke="#F05C5C" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#ltr)"/>
    <defs><marker id="ltr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="200" y="322" fill="#F05C5C" font-size="15" font-weight="700">wrong lane &#10007;</text>

    <rect x="760" y="540" width="380" height="120" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="786" y="578" fill="#E6EAF0" font-size="19" font-weight="700">Finish in the nearest lane</text>
    <text x="786" y="608" fill="#8A8F9A" font-size="15">Turn into the lane just past the centre</text>
    <text x="786" y="630" fill="#8A8F9A" font-size="15">line. If the light goes amber while you</text>
    <text x="786" y="652" fill="#8A8F9A" font-size="15">wait, clear the intersection when safe.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — completing a left turn; clearing on amber.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 7 — RECAP ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Recap of left turn on green"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <text x="600" y="80" text-anchor="middle" fill="#E6EAF0" font-size="32" font-weight="700">Left turn on a green — recap</text>
    <g>
      <rect x="150" y="130" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="165" r="14" fill="#F5A623"/><text x="190" y="170" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">1</text>
      <text x="222" y="171" fill="#E6EAF0" font-size="18">Signal left ~30 m early, take the left lane.</text>
      <rect x="150" y="212" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="247" r="14" fill="#5BA8F5"/><text x="190" y="252" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">2</text>
      <text x="222" y="253" fill="#E6EAF0" font-size="18">Enter on green; wait past centre, wheels straight.</text>
      <rect x="150" y="294" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="329" r="14" fill="#F05C5C"/><text x="190" y="334" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">3</text>
      <text x="222" y="335" fill="#E6EAF0" font-size="18">Yield to oncoming traffic and pedestrians.</text>
      <rect x="150" y="376" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="411" r="14" fill="#3DD68C"/><text x="190" y="416" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">4</text>
      <text x="222" y="417" fill="#E6EAF0" font-size="18">When clear, turn into the nearest left lane.</text>
      <rect x="150" y="458" width="900" height="70" rx="12" fill="#1A1D24" stroke="#2A2D35"/>
      <circle cx="190" cy="493" r="14" fill="#3DD68C"/><text x="190" y="498" text-anchor="middle" fill="#0D0F12" font-size="15" font-weight="700">5</text>
      <text x="222" y="499" fill="#E6EAF0" font-size="18">Amber while waiting? Clear the intersection when safe.</text>
    </g>
    <rect x="150" y="560" width="900" height="3" fill="#2A2D35"/>
    <text x="150" y="600" fill="#8A8F9A" font-size="15">Watch your clip again, then picture this gap-and-go next time you're turning left.</text>
    <text x="600" y="680" text-anchor="middle" fill="#8A8F9A" font-size="14">ClearConnect &#183; Per the Official Ontario MTO Driver's Handbook</text>
  </svg>
  </div></section>

  </article>
</main>
<script src="static/js/webslides.js"></script>
<script>window.ws = new WebSlides();</script>
</body>
</html>
