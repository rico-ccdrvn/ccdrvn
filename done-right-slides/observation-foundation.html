<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Observation — the Foundation — ClearConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" type="text/css" media="all" href="static/css/webslides.css">
  <style>
    #webslides section.dr{ background:#0D0F12; padding:0; }
    .dr .wrap{ max-width:100%; padding:0; height:100%; }
    .dr svg{ display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<main role="main">
  <article id="webslides">

  <!-- ============ SLIDE 1 — TITLE ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Observation, the foundation — title"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <!-- eye emblem -->
    <g transform="translate(600,235)">
      <path d="M-70,0 Q0,-52 70,0 Q0,52 -70,0 Z" fill="#1A1D24" stroke="#5BA8F5" stroke-width="3"/>
      <circle cx="0" cy="0" r="22" fill="#5BA8F5"/><circle cx="0" cy="0" r="9" fill="#0D0F12"/>
    </g>
    <text x="600" y="400" text-anchor="middle" fill="#E6EAF0" font-size="52" font-weight="700">Observation &#8212; the Foundation</text>
    <text x="600" y="450" text-anchor="middle" fill="#8A8F9A" font-size="22">How seeing is scored</text>
    <rect x="470" y="500" width="260" height="44" rx="22" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="600" y="528" text-anchor="middle" fill="#3DD68C" font-size="17" font-weight="700">Tap or swipe to begin &#8594;</text>
    <text x="600" y="660" text-anchor="middle" fill="#8A8F9A" font-size="15">Per the Official Ontario MTO Driver's Handbook</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 2 — WHY IT MATTERS ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Why observation matters"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">1</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Driving is a seeing task</text>

    <text x="100" y="200" fill="#E6EAF0" font-size="26" font-weight="700">You can only react to what you have seen.</text>
    <text x="100" y="248" fill="#8A8F9A" font-size="18">Most driving errors start as observation errors — the hazard</text>
    <text x="100" y="276" fill="#8A8F9A" font-size="18">was there to be seen, but the check never happened.</text>

    <rect x="100" y="340" width="320" height="120" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="120" y="384" fill="#5BA8F5" font-size="26" font-weight="700">Keep eyes moving</text>
    <text x="120" y="420" fill="#8A8F9A" font-size="15">Never fix your stare on one</text>
    <text x="120" y="442" fill="#8A8F9A" font-size="15">spot — keep scanning.</text>

    <rect x="440" y="340" width="320" height="120" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="460" y="384" fill="#F5A623" font-size="26" font-weight="700">Look far ahead</text>
    <text x="460" y="420" fill="#8A8F9A" font-size="15">Plan for what's coming, not</text>
    <text x="460" y="442" fill="#8A8F9A" font-size="15">just the car in front.</text>

    <rect x="780" y="340" width="320" height="120" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="800" y="384" fill="#3DD68C" font-size="26" font-weight="700">Check, don't guess</text>
    <text x="800" y="420" fill="#8A8F9A" font-size="15">Mirrors and blind spots before</text>
    <text x="800" y="442" fill="#8A8F9A" font-size="15">every move.</text>

    <text x="100" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — seeing well; scanning.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 3 — THE SCAN LOOP ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="The continuous scan loop"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">2</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">The scan loop never stops</text>

    <!-- four nodes around a circle -->
    <!-- top: road ahead -->
    <rect x="470" y="130" width="260" height="78" rx="14" fill="#1A1D24" stroke="#5BA8F5"/>
    <text x="600" y="165" text-anchor="middle" fill="#E6EAF0" font-size="20" font-weight="700">Road ahead</text>
    <text x="600" y="190" text-anchor="middle" fill="#8A8F9A" font-size="14">far, then near</text>
    <!-- right: mirrors -->
    <rect x="820" y="320" width="260" height="78" rx="14" fill="#1A1D24" stroke="#F5A623"/>
    <text x="950" y="355" text-anchor="middle" fill="#E6EAF0" font-size="20" font-weight="700">Mirrors</text>
    <text x="950" y="380" text-anchor="middle" fill="#8A8F9A" font-size="14">rear &amp; side</text>
    <!-- bottom: instruments -->
    <rect x="470" y="512" width="260" height="78" rx="14" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="600" y="547" text-anchor="middle" fill="#E6EAF0" font-size="20" font-weight="700">Speed check</text>
    <text x="600" y="572" text-anchor="middle" fill="#8A8F9A" font-size="14">a quick glance</text>
    <!-- left: ahead again -->
    <rect x="120" y="320" width="260" height="78" rx="14" fill="#1A1D24" stroke="#5BA8F5"/>
    <text x="250" y="355" text-anchor="middle" fill="#E6EAF0" font-size="20" font-weight="700">Back to ahead</text>
    <text x="250" y="380" text-anchor="middle" fill="#8A8F9A" font-size="14">always return here</text>

    <!-- circular arrows -->
    <path d="M735,175 Q900,210 955,315" fill="none" stroke="#8A8F9A" stroke-width="3" marker-end="url(#sl)"/>
    <path d="M945,400 Q820,520 735,545" fill="none" stroke="#8A8F9A" stroke-width="3" marker-end="url(#sl)"/>
    <path d="M468,553 Q330,520 252,402" fill="none" stroke="#8A8F9A" stroke-width="3" marker-end="url(#sl)"/>
    <path d="M255,318 Q330,205 468,172" fill="none" stroke="#8A8F9A" stroke-width="3" marker-end="url(#sl)"/>
    <defs><marker id="sl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#8A8F9A"/></marker></defs>

    <circle cx="600" cy="360" r="34" fill="#5BA8F5"/><circle cx="600" cy="360" r="13" fill="#0D0F12"/>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — keep your eyes moving; scanning routine.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 4 — MIRROR CADENCE ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Check mirrors every five to eight seconds"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">3</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Mirrors, on a rhythm</text>

    <text x="100" y="170" fill="#E6EAF0" font-size="22" font-weight="700">Glance at your interior mirror every 5&#8211;8 seconds.</text>
    <text x="100" y="206" fill="#8A8F9A" font-size="16">Often enough to know what's behind before you ever need it.</text>

    <!-- timeline -->
    <line x1="120" y1="380" x2="1080" y2="380" stroke="#2A2D35" stroke-width="4"/>
    <g>
      <!-- ticks every ~160px = ~6s -->
      <g fill="#F5A623">
        <circle cx="200" cy="380" r="13"/><circle cx="380" cy="380" r="13"/><circle cx="560" cy="380" r="13"/>
        <circle cx="740" cy="380" r="13"/><circle cx="920" cy="380" r="13"/>
      </g>
      <g fill="#8A8F9A" font-size="14" text-anchor="middle">
        <text x="200" y="345">glance</text><text x="380" y="345">glance</text><text x="560" y="345">glance</text>
        <text x="740" y="345">glance</text><text x="920" y="345">glance</text>
      </g>
      <g stroke="#3DD68C" stroke-width="2"><line x1="200" y1="420" x2="380" y2="420"/></g>
      <text x="290" y="448" text-anchor="middle" fill="#3DD68C" font-size="15" font-weight="700">~6 s</text>
    </g>

    <rect x="120" y="500" width="960" height="110" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="146" y="540" fill="#E6EAF0" font-size="18" font-weight="700">Check before, not after</text>
    <text x="146" y="572" fill="#8A8F9A" font-size="15">Mirror first, then signal, then act — slowing down, changing lanes,</text>
    <text x="146" y="594" fill="#8A8F9A" font-size="15">or turning. A mirror check after you've moved is too late.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — using your mirrors.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 5 — EYES-ONLY VS HEAD MOVE ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Eyes-only glance versus a real head movement"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">4</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">A real check moves your head</text>

    <!-- LEFT: eyes only -->
    <rect x="120" y="140" width="430" height="470" rx="16" fill="#1A1D24" stroke="#F05C5C"/>
    <text x="335" y="182" text-anchor="middle" fill="#F05C5C" font-size="19" font-weight="700">Eyes-only flick &#10007;</text>
    <circle cx="335" cy="350" r="58" fill="none" stroke="#8A8F9A" stroke-width="4"/>
    <circle cx="318" cy="340" r="9" fill="#F05C5C"/><circle cx="352" cy="340" r="9" fill="#F05C5C"/>
    <path d="M335,408 q0,28 0,28" stroke="#8A8F9A" stroke-width="3" fill="none"/>
    <path d="M335,292 l0,-26" stroke="#F05C5C" stroke-width="3" marker-end="url(#eo)"/>
    <defs><marker id="eo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#F05C5C"/></marker></defs>
    <text x="335" y="500" text-anchor="middle" fill="#8A8F9A" font-size="15">Head stays forward; only eyes move.</text>
    <text x="335" y="524" text-anchor="middle" fill="#8A8F9A" font-size="15">Easy to miss — and hard to credit.</text>

    <!-- RIGHT: head movement -->
    <rect x="650" y="140" width="430" height="470" rx="16" fill="#1A1D24" stroke="#3DD68C"/>
    <text x="865" y="182" text-anchor="middle" fill="#3DD68C" font-size="19" font-weight="700">Head turn &#10003;</text>
    <g transform="rotate(-26 865 350)">
      <circle cx="865" cy="350" r="58" fill="none" stroke="#E6EAF0" stroke-width="4"/>
      <circle cx="848" cy="340" r="9" fill="#3DD68C"/><circle cx="882" cy="340" r="9" fill="#3DD68C"/>
    </g>
    <path d="M905,300 q60,-20 86,-44" stroke="#3DD68C" stroke-width="3" fill="none" marker-end="url(#hm)"/>
    <defs><marker id="hm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#3DD68C"/></marker></defs>
    <text x="865" y="500" text-anchor="middle" fill="#8A8F9A" font-size="15">A clear head movement actually clears</text>
    <text x="865" y="524" text-anchor="middle" fill="#8A8F9A" font-size="15">the mirror's edge and your blind spot.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">ClearConnect scores the check from validated head-yaw.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 6 — INTERSECTION L-R-L ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Scan left right left at intersections"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">5</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">At every intersection: L &#8594; R &#8594; L</text>

    <rect x="120" y="160" width="720" height="200" fill="#1A1D24"/>
    <line x1="120" y1="160" x2="840" y2="160" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="120" y1="260" x2="840" y2="260" stroke="#F5A623" stroke-width="3" stroke-dasharray="26 22"/>
    <rect x="560" y="360" width="200" height="300" fill="#1A1D24"/>
    <line x1="560" y1="360" x2="560" y2="660" stroke="#E6EAF0" stroke-width="3"/>
    <line x1="760" y1="360" x2="760" y2="660" stroke="#E6EAF0" stroke-width="3"/>

    <rect x="672" y="430" width="60" height="120" rx="13" fill="#5BA8F5"/>
    <text x="702" y="600" text-anchor="middle" fill="#5BA8F5" font-size="14" font-weight="700">YOU</text>
    <path d="M690,440 Q360,300 235,205" fill="none" stroke="#5BA8F5" stroke-width="2.6" marker-end="url(#ir)"/>
    <path d="M712,440 Q1010,300 1110,215" fill="none" stroke="#5BA8F5" stroke-width="2.6" marker-end="url(#ir)" opacity=".85"/>
    <text x="250" y="185" fill="#5BA8F5" font-size="15" font-weight="700">1. LEFT</text>
    <text x="1060" y="195" fill="#5BA8F5" font-size="15" font-weight="700">2. RIGHT</text>
    <text x="300" y="250" fill="#8A8F9A" font-size="14">3. LEFT again before you go</text>
    <defs><marker id="ir" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#5BA8F5"/></marker></defs>

    <rect x="880" y="430" width="270" height="140" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="906" y="470" fill="#E6EAF0" font-size="18" font-weight="700">Left is checked twice</text>
    <text x="906" y="500" fill="#8A8F9A" font-size="15">Traffic nearest you comes from</text>
    <text x="906" y="522" fill="#8A8F9A" font-size="15">the left — so it's your first and</text>
    <text x="906" y="544" fill="#8A8F9A" font-size="15">last look before moving.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">MTO Driver's Handbook — scanning at intersections.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 7 — BLIND SPOTS ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Where mirrors fail — the blind spot"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">6</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Where mirrors stop seeing</text>

    <!-- top-down ego with FOV + blind zone -->
    <g transform="translate(330,120)">
      <rect x="-30" y="0" width="240" height="500" fill="#1A1D24"/>
      <!-- side mirror FOV -->
      <polygon points="90,180 -20,470 70,470" fill="#F5A623" opacity=".14" stroke="#F5A623" stroke-width="1.2"/>
      <!-- blind spot zone -->
      <polygon points="92,210 184,210 188,330 96,330" fill="#F05C5C" opacity=".15" stroke="#F05C5C" stroke-width="1.4" stroke-dasharray="6 5"/>
      <text x="140" y="278" fill="#F05C5C" font-size="13" font-weight="700" text-anchor="middle">BLIND SPOT</text>
      <!-- hidden car -->
      <rect x="112" y="232" width="46" height="80" rx="9" fill="#F05C5C"/>
      <!-- ego -->
      <rect x="20" y="150" width="60" height="120" rx="14" fill="#5BA8F5"/>
      <circle cx="38" cy="200" r="9" fill="none" stroke="#0D0F12" stroke-width="3"/><circle cx="38" cy="200" r="2.4" fill="#0D0F12"/>
    </g>

    <rect x="640" y="220" width="470" height="190" rx="14" fill="#1A1D24" stroke="#2A2D35"/>
    <text x="666" y="262" fill="#E6EAF0" font-size="21" font-weight="700">Mirrors leave a gap</text>
    <text x="666" y="296" fill="#8A8F9A" font-size="16">The zone beside and just behind your door</text>
    <text x="666" y="320" fill="#8A8F9A" font-size="16">never appears in any mirror.</text>
    <text x="666" y="354" fill="#8A8F9A" font-size="16">Only a <tspan fill="#3DD68C" font-weight="700">shoulder check</tspan> finds a vehicle hiding</text>
    <text x="666" y="378" fill="#8A8F9A" font-size="16">there — do it before every lane change or turn.</text>
    <text x="120" y="700" fill="#8A8F9A" font-size="13">See the Mirror &amp; Shoulder Check deck for the full sequence.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 8 — ANTICIPATION ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Anticipate hazards by looking well ahead"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">7</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Look far ahead, plan early</text>

    <!-- perspective road narrowing to a vanishing point -->
    <polygon points="430,640 770,640 660,180 540,180" fill="#1A1D24"/>
    <line x1="600" y1="640" x2="600" y2="180" stroke="#F5A623" stroke-width="4" stroke-dasharray="30 26"/>
    <rect x="556" y="540" width="88" height="90" rx="12" fill="#5BA8F5"/>
    <text x="600" y="665" text-anchor="middle" fill="#5BA8F5" font-size="13" font-weight="700">YOU</text>

    <!-- distant hazards flagged -->
    <circle cx="640" cy="240" r="10" fill="#F5A623"/>
    <path d="M654,240 L820,210" stroke="#2A2D35" stroke-width="2"/>
    <rect x="828" y="186" width="300" height="48" rx="10" fill="#1A1D24" stroke="#F5A623"/>
    <text x="848" y="216" fill="#E6EAF0" font-size="15">Parked car — a door may open</text>

    <circle cx="556" cy="320" r="10" fill="#F5A623"/>
    <path d="M546,320 L370,300" stroke="#2A2D35" stroke-width="2"/>
    <rect x="70" y="276" width="298" height="48" rx="10" fill="#1A1D24" stroke="#F5A623"/>
    <text x="90" y="306" fill="#E6EAF0" font-size="15">Pedestrian near the curb</text>

    <circle cx="636" cy="410" r="10" fill="#F5A623"/>
    <path d="M650,410 L820,420" stroke="#2A2D35" stroke-width="2"/>
    <rect x="828" y="396" width="300" height="48" rx="10" fill="#1A1D24" stroke="#F5A623"/>
    <text x="848" y="426" fill="#E6EAF0" font-size="15">Brake lights — traffic slowing</text>

    <text x="100" y="690" fill="#8A8F9A" font-size="14">Seeing a hazard early turns a hard reaction into a smooth, planned one.</text>
  </svg>
  </div></section>

  <!-- ============ SLIDE 9 — COMMON ERRORS ============ -->
  <section class="dr"><div class="wrap">
  <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Common observation errors"
       font-family="DejaVu Sans, Segoe UI, sans-serif">
    <rect x="0" y="0" width="1200" height="720" fill="#0D0F12"/>
    <circle cx="64" cy="56" r="20" fill="#5BA8F5"/><text x="64" y="63" text-anchor="middle" fill="#0D0F12" font-size="20" font-weight="700">8</text>
    <text x="100" y="63" fill="#E6EAF0" font-size="30" font-weight="700">Common observation errors</text>

    <g>
      <rect x="120" y="150" width="960" height="90" rx="12" fill="#1A1D24" stroke="#F05C5C"/>
      <text x="150" y="190" fill="#F05C5C" font-size="22" font-weight="700">&#10007;</text>
      <text x="190" y="190" fill="#E6EAF0" font-size="19" font-weight="700">Fixed stare</text>
      <text x="190" y="218" fill="#8A8F9A" font-size="15">Locking onto the car ahead instead of scanning the whole scene.</text>

      <rect x="120" y="256" width="960" height="90" rx="12" fill="#1A1D24" stroke="#F05C5C"/>
      <text x="150" y="296" fill="#F05C5C" font-size="22" font-weight="700">&#10007;</text>
      <text x="190" y="296" fill="#E6EAF0" font-size="19" font-weight="700">Eyes-only glance</text>
