<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mirror → Mirror → Shoulder — ClearConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" type="text/css" media="all" href="static/css/webslides.css">
  <style>
    #webslides section.ms{ background:#0b1220; padding:0; }
    .ms .wrap{ max-width:100%; padding:0; height:100%; }
    .ms svg{ display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<main role="main">
  <article id="webslides">
    <section class="ms">
      <div class="wrap">
<svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img"
     aria-label="Top-down view of mirror and shoulder-check coverage, North American left-hand drive"
     font-family="DejaVu Sans, Segoe UI, sans-serif">
  <rect x="0" y="0" width="1200" height="720" fill="#0b1220"/>

  <!-- ===================== TITLE ===================== -->
  <g fill="#e6edf6" font-size="34" font-weight="700">
    <text x="339" y="50">Mirror</text>
    <text x="514" y="50">Mirror</text>
    <text x="689" y="50">Shoulder</text>
    <path d="M477,31 L495,41 L477,51 Z" fill="#2dd4bf"/>
    <path d="M652,31 L670,41 L652,51 Z" fill="#2dd4bf"/>
  </g>
  <text x="600" y="80" text-anchor="middle" fill="#8aa0bd" font-size="16">
    The blind-spot check, top-down · per the Ontario Driver's Handbook
  </text>

  <!-- ===================== DIAGRAM (left) ===================== -->
  <g transform="translate(46,104) scale(0.80)">
    <!-- road: 3 same-direction lanes (North American) -->
    <rect x="60" y="0" width="440" height="690" fill="#111a2b"/>
    <line x1="60"  y1="0" x2="60"  y2="690" stroke="#f1f5f9" stroke-width="3"/>
    <line x1="500" y1="0" x2="500" y2="690" stroke="#f1f5f9" stroke-width="3"/>
    <line x1="207" y1="0" x2="207" y2="690" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="22 20" opacity=".55"/>
    <line x1="353" y1="0" x2="353" y2="690" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="22 20" opacity=".55"/>
    <path d="M280,26 l9,16 h-18 z" fill="#8aa0bd"/>
    <text x="280" y="62" fill="#8aa0bd" font-size="11" text-anchor="middle" letter-spacing="1">TRAVEL</text>

    <!-- FOV wedges (under cars) -->
    <polygon points="280,372 236,672 324,672" fill="#3b82f6" opacity=".16"/>
    <polygon points="280,372 236,672 324,672" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity=".5"/>
    <polygon points="245,300 96,672 184,672"  fill="#f59e0b" opacity=".15"/>
    <polygon points="245,300 96,672 184,672"  fill="none" stroke="#f59e0b" stroke-width="1.2" opacity=".5"/>
    <polygon points="315,300 376,672 464,672" fill="#f59e0b" opacity=".15"/>
    <polygon points="315,300 376,672 464,672" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity=".5"/>

    <!-- blind-spot zones (the gap mirrors miss), now out in the adjacent lanes -->
    <polygon points="92,372 184,372 176,524 88,524" fill="#c084fc" opacity=".14"/>
    <polygon points="92,372 184,372 176,524 88,524" fill="none" stroke="#c084fc" stroke-width="1.4" stroke-dasharray="6 5"/>
    <polygon points="376,372 468,372 472,524 384,524" fill="#c084fc" opacity=".14"/>
    <polygon points="376,372 468,372 472,524 384,524" fill="none" stroke="#c084fc" stroke-width="1.4" stroke-dasharray="6 5"/>
    <text x="74"  y="468" fill="#c084fc" font-size="11" font-weight="700" text-anchor="middle" transform="rotate(-90 74 468)">BLIND SPOT</text>
    <text x="486" y="468" fill="#c084fc" font-size="11" font-weight="700" text-anchor="middle" transform="rotate(90 486 468)">BLIND SPOT</text>

    <!-- hidden traffic (red), now clearly in the adjacent lanes -->
    <g>
      <rect x="110" y="398" width="46" height="96" rx="9" fill="#ef4444" opacity=".92"/>
      <rect x="117" y="408" width="32" height="22" rx="4" fill="#7f1d1d"/>
      <rect x="117" y="462" width="32" height="22" rx="4" fill="#7f1d1d"/>
    </g>
    <g>
      <rect x="404" y="398" width="46" height="96" rx="9" fill="#ef4444" opacity=".92"/>
      <rect x="411" y="408" width="32" height="22" rx="4" fill="#7f1d1d"/>
      <rect x="411" y="462" width="32" height="22" rx="4" fill="#7f1d1d"/>
    </g>

    <!-- ego / student car (teal), faces up, LEFT-HAND DRIVE -->
    <g>
      <rect x="248" y="250" width="64" height="150" rx="14" fill="#2dd4bf"/>
      <rect x="256" y="262" width="48" height="26" rx="6" fill="#0b1220" opacity=".55"/>
      <rect x="256" y="360" width="48" height="26" rx="6" fill="#0b1220" opacity=".55"/>
      <rect x="238" y="296" width="12" height="7" rx="2" fill="#2dd4bf"/>
      <rect x="310" y="296" width="12" height="7" rx="2" fill="#2dd4bf"/>
      <!-- driver on the LEFT -->
      <circle cx="266" cy="318" r="10" fill="none" stroke="#06121f" stroke-width="3"/>
      <circle cx="266" cy="318" r="2.4" fill="#06121f"/>
      <text x="294" y="322" fill="#06121f" font-size="10" font-weight="700" text-anchor="middle">YOU</text>
    </g>

    <!-- chin-to-shoulder gaze arrows from the DRIVER's seat -->
    <!-- left: short, natural turn -->
    <path d="M260,322 Q150,332 150,418" fill="none" stroke="#c084fc" stroke-width="2.8" marker-end="url(#ah)"/>
    <!-- right: a much bigger turn across the cabin -->
    <path d="M272,316 Q452,286 420,418" fill="none" stroke="#c084fc" stroke-width="2.8" marker-end="url(#ah)" opacity=".9"/>
    <defs>
      <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L6,3 L0,6 Z" fill="#c084fc"/>
      </marker>
    </defs>
  </g>

  <!-- ===================== PANEL (right) ===================== -->
  <!-- legend -->
  <g font-size="15" fill="#8aa0bd">
    <rect x="600" y="138" width="15" height="15" rx="3" fill="#3b82f6"/><text x="624" y="150">Interior mirror</text>
    <rect x="772" y="138" width="15" height="15" rx="3" fill="#f59e0b"/><text x="796" y="150">Side mirror</text>
    <rect x="600" y="168" width="15" height="15" rx="3" fill="#c084fc"/><text x="624" y="180">Chin to shoulder</text>
    <rect x="772" y="168" width="15" height="15" rx="3" fill="#ef4444"/><text x="796" y="180">Hidden vehicle</text>
  </g>

  <!-- step cards -->
  <g>
    <!-- 1 -->
    <rect x="600" y="212" width="552" height="92" rx="12" fill="#111a2b" stroke="#26344b"/>
    <circle cx="634" cy="258" r="18" fill="#3b82f6"/><text x="634" y="264" text-anchor="middle" fill="#06121f" font-size="18" font-weight="700">1</text>
    <text x="668" y="251" fill="#e6edf6" font-size="19" font-weight="700">Interior rear-view mirror</text>
    <text x="668" y="278" fill="#8aa0bd" font-size="15">Traffic directly behind you — your first glance.</text>
    <!-- 2 -->
    <rect x="600" y="316" width="552" height="92" rx="12" fill="#111a2b" stroke="#26344b"/>
    <circle cx="634" cy="362" r="18" fill="#f59e0b"/><text x="634" y="368" text-anchor="middle" fill="#06121f" font-size="18" font-weight="700">2</text>
    <text x="668" y="355" fill="#e6edf6" font-size="19" font-weight="700">Side mirror</text>
    <text x="668" y="382" fill="#8aa0bd" font-size="15">The lane alongside — but it stops short of your door.</text>
    <!-- 3 -->
    <rect x="600" y="420" width="552" height="92" rx="12" fill="#111a2b" stroke="#26344b"/>
    <circle cx="634" cy="466" r="18" fill="#c084fc"/><text x="634" y="472" text-anchor="middle" fill="#06121f" font-size="18" font-weight="700">3</text>
    <text x="668" y="459" fill="#e6edf6" font-size="19" font-weight="700">Chin to shoulder</text>
    <text x="668" y="486" fill="#8aa0bd" font-size="15">A quick over-the-shoulder look clears the blind spot.</text>
  </g>

  <!-- footnote -->
  <rect x="600" y="548" width="3" height="118" fill="#2dd4bf"/>
  <g fill="#8aa0bd" font-size="15">
    <text x="616" y="566"><tspan fill="#2dd4bf" font-weight="700">Mirrors are not enough.</tspan> Each red car sits in a zone no</text>
    <text x="616" y="589">mirror covers — only the shoulder check finds it.</text>
    <text x="616" y="618">ClearConnect scores that glance from validated <tspan fill="#e6edf6">head-yaw</tspan>;</text>
    <text x="616" y="641">the <tspan fill="#e6edf6">left</tspan> check is the harder turn, recovered from the</text>
    <text x="616" y="664"><tspan fill="#e6edf6">right-ear</tspan> marker when the passenger cam loses it.</text>
  </g>
</svg>
      </div>
    </section>
  </article>
</main>
<script src="static/js/webslides.js"></script>
<script>window.ws = new WebSlides();</script>
</body>
</html>
